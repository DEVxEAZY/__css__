<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CSS Interno</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: darkred;
        }
        .container {
            padding: 20px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSS Interno</h1>
        <p>Este CSS está incorporado dentro da tag &lt;style&gt; no &lt;head&gt; da página.</p>
    </div>
</body>
</html>
