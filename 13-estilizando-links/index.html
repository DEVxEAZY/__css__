<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estilizando Links</title>
    <style>
        .link-exemplo {
            text-decoration: none;
            padding: 10px;
            background-color: lightblue;
            border-radius: 5px;
            color: black;
            shadow: 2px 2px 2px rgba(0, 0, 0, 0.5);
            }
        .link-exemplo:hover {
                background-color: rgb(110, 110, 216);
                color: rgb(0, 0, 0);
                shadow: 2px 2px 2px rgba(0, 0, 0, 0.5);
                font-weight: bold;
        }.link-exemplo:visited {
            background-color: lightgray;
            color: black;
            shadow: 2px 2px 2px rgba(0, 0, 0, 0.5);
            font-weight: bold;
        }
        .link-exemplo:active {
            background-color: red;
            color: white;
            shadow: 2px 2px 2px rgba(0, 0, 0, 0.5);
            font-weight: bold;
        }
        
    
    </style>
</head>
<body>
    <h1>Estilizando Links</h1>
    <p>Passe o mouse sobre o link: <a href="#" class="link-exemplo">Link de Exemplo</a></p>
</body>
</html>
