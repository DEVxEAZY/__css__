<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estilizando Links</title>
    <style>
        a {
            text-decoration: none;
            color: blue;
        }
        a:hover {
            color: red;
            text-decoration: underline;
        }
        a:visited {
            color: purple;
        }
        a:active {
            color: orange;
        }
    </style>
</head>
<body>
    <h1>Estilizando Links</h1>
    <p>Passe o mouse sobre o link: <a href="#">Link de Exemplo</a></p>
</body>
</html>
