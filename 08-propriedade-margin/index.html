<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Propriedade Margin</title>
    <style>
        .container { border: 1px solid red; }
        .box {
            background-color: lightblue;
            border: 1px solid blue;
            margin: 20px; /* Margem em todos os lados */
        }
        .box-top { margin-top: 50px; background-color: lightgreen; }
    </style>
</head>
<body>
    <h1>Propriedade: Margin</h1>
    <div class="container">
        <div class="box">Box com margin de 20px</div>
        <div class="box box-top">Box com margin-top de 50px</div>
    </div>
</body>
</html>
