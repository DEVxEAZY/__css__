    <title>Propriedade Text</title>

        .alinhar-direita { text-align: right; }
        .maiuscula { text-transform: uppercase; }
        .sublinhado { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Propriedade: Text</h1>
    <p class="alinhar-centro">Texto Centralizado</p>

    <p class="maiuscula">texto em maiúsculas</p>
    <p class="sublinhado">Texto Sublinhado</p>
</body>
</html>
