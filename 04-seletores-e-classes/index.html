<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Seletores e Classes</title>
    <style>
        /* Seletor de Tag */
        h1 { color: #333; }

        /* Seletor de Classe */
        .destaque {
            color: green;
            font-weight: bold;
        }

        /* Seletor de ID */
        #titulo-principal {
            text-decoration: underline;
        }

        /* Seletor Composto */
        div p {
            color: gray;
        }
    </style>
</head>
<body>
    <h1 id="titulo-principal">Seletores e Classes</h1>
    <p class="destaque">Este parágrafo usa uma classe para estilização.</p>
    <div>
        <p>Este parágrafo está dentro de uma div e usa seletor composto.</p>
    </div>
</body>
</html>
