<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Propriedade Padding</title>
    <style>
        .box {
            background-color: lightcoral;
            border: 2px solid darkred;
            margin-bottom: 20px;
        }
        .padding-small { padding: 10px; }
        .padding-large { padding: 40px; }
    </style>
</head>
<body>
    <h1>Propriedade: Padding</h1>
    <div class="box padding-small">Padding Pequeno (10px)</div>
    <div class="box padding-large">Padding Grande (40px)</div>
</body>
</html>
