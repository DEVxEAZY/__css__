<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Propriedade Fonts</title>
    <style>
        .serif { font-family: Georgia, serif; }
        .sans-serif { font-family: Arial, sans-serif; }
        .tamanho { font-size: 24px; }
        .negrito { font-weight: bold; }
        .italico { font-style: italic; }
    </style>
</head>
<body>
    <h1>Propriedade: Fonts</h1>
    <p class="serif">Fonte Serifada</p>
    <p class="sans-serif">Fonte Sans-serif</p>
    <p class="tamanho">Fonte tamanho 24px</p>
    <p class="negrito">Fonte em Negrito</p>
    <p class="italico">Fonte em Itálico</p>
</body>
</html>
