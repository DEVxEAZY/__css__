<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Propriedade Color</title>
    <style>
        .nome { color: red; }
        .hex { color: #00ff00; }
        .rgb { color: rgb(0, 0, 255); }
        .rgba { color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>
    <h1>Propriedade: Color</h1>
    <p class="nome">Cor por nome (red)</p>
    <p class="hex">Cor por Hexadecimal (#00ff00)</p>
    <p class="rgb">Cor por RGB (rgb(0, 0, 255))</p>
    <p class="rgba">Cor por RGBA com transparência (rgba(0,0,0,0.5))</p>
</body>
</html>
