<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Width e Height</title>
    <style>
        .quadrado {
            width: 100px;
            height: 100px;
            background-color: purple;
            color: white;
            margin-bottom: 20px;
        }
        .retangulo {
            width: 200px;
            height: 50px;
            background-color: orange;
        }
    </style>
</head>
<body>
    <h1>Propriedades: Width e Height</h1>
    <div class="quadrado">100x100</div>
    <div class="retangulo">200x50</div>
</body>
</html>
