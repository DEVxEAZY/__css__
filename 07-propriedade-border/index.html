<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Propriedade Border</title>
    <style>
        .borda-simples { border: 2px solid black; padding: 10px; margin-bottom: 10px; }
        .borda-tracejada { border: 2px dashed blue; padding: 10px; margin-bottom: 10px; }
        .borda-arredondada { border: 2px solid green; border-radius: 15px; padding: 10px; }
    </style>
</head>
<body>
    <h1>Propriedade: Border</h1>
    <div class="borda-simples">Borda Sólida</div>
    <div class="borda-tracejada">Borda Tracejada</div>
    <div class="borda-arredondada">Borda com border-radius</div>
</body>
</html>
